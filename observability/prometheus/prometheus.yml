global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:

  # Kafka broker metrics via JMX exporter
  # Exposes: throughput, request rate, log size, controller state
  - job_name: kafka-jmx
    static_configs:
      - targets: ['jmx-exporter:5556']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: kafka

  # Consumer group lag via AdminClient (kafka-exporter)
  # Exposes: kafka_consumergroup_lag{consumergroup, topic, partition}
  - job_name: kafka-exporter
    static_configs:
      - targets: ['kafka-exporter:9308']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: kafka
