global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: kafka-jmx
    static_configs:
      - targets: ['jmx-exporter:5556']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: kafka

  # kafka-connect: requires JMX exporter sidecar — not available in this setup
  # dagster: requires dagster-prometheus package — not configured
