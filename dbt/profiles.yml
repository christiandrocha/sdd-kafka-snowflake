ai_kafka_microbatch:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:

    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      schema: SILVER
      threads: 4
      client_session_keep_alive: false

    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT_PROD', env_var('SNOWFLAKE_ACCOUNT')) }}"
      user: "{{ env_var('SNOWFLAKE_USER_PROD', env_var('SNOWFLAKE_USER')) }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE_PROD', 'CDC_ROLE_PROD') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE_PROD', 'CDC_POC_PROD') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE_PROD', 'CDC_WH_PROD') }}"
      schema: SILVER
      threads: 8
      client_session_keep_alive: false
